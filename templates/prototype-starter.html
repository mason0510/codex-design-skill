<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype Starter</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --brand: #7c3aed;
      --gap: 24px;
      --radius: 20px;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }
    body[data-theme="light"] {
      --bg: #eef2ff;
      --panel: rgba(255, 255, 255, 0.92);
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --brand: #4f46e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, rgba(124, 58, 237, 0.28), transparent 32%), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .shell {
      width: min(1200px, 100%);
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }
    .canvas {
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      min-height: 720px;
    }
    .eyebrow {
      color: var(--brand);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }
    h1 {
      font-size: clamp(40px, 5vw, 68px);
      line-height: 1.02;
      margin: 12px 0 16px;
    }
    p {
      font-size: 18px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 720px;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      margin-top: 36px;
    }
    .card {
      border-radius: var(--radius);
      background: #f8fafc;
      padding: 24px;
      min-height: 180px;
    }
    .card strong { display: block; margin-bottom: 10px; }
    .panel {
      background: var(--panel);
      backdrop-filter: blur(16px);
      color: white;
      border-radius: 24px;
      padding: 20px;
      position: sticky;
      top: 24px;
    }
    .panel h2 { margin: 0 0 16px; font-size: 18px; }
    .panel label { display: block; margin: 14px 0 8px; font-size: 13px; opacity: 0.86; }
    .panel select, .panel button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
    }
    .panel button {
      margin-top: 16px;
      background: #ffffff;
      color: #111827;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .panel { position: static; }
    }
  </style>
</head>
<body data-theme="dark" data-density="comfortable">
  <div class="shell">
    <main class="canvas">
      <div class="eyebrow">Prototype Starter</div>
      <h1>把这里替换成你的核心设计命题</h1>
      <p>这个起步模板提供一个适合高保真原型迭代的基础结构：主舞台、卡片区、主题切换和密度切换。真正交付时，应替换成用户的真实设计上下文与视觉语言。</p>
      <section class="grid" id="grid">
        <article class="card"><strong>模块 A</strong><span>在这里放关键界面或状态。</span></article>
        <article class="card"><strong>模块 B</strong><span>在这里放第二块信息或流程节点。</span></article>
        <article class="card"><strong>模块 C</strong><span>在这里放第三块可比较内容。</span></article>
      </section>
    </main>
    <aside class="panel">
      <h2>Tweaks</h2>
      <label for="theme">主题</label>
      <select id="theme">
        <option value="dark">暗色</option>
        <option value="light">亮色</option>
      </select>
      <label for="density">信息密度</label>
      <select id="density">
        <option value="comfortable">舒展</option>
        <option value="compact">紧凑</option>
      </select>
      <button id="reset">恢复默认</button>
    </aside>
  </div>
  <script>
    const key = 'codex-design-skill:prototype-starter';
    const body = document.body;
    const theme = document.getElementById('theme');
    const density = document.getElementById('density');
    const reset = document.getElementById('reset');
    const grid = document.getElementById('grid');

    const apply = (state) => {
      body.dataset.theme = state.theme;
      body.dataset.density = state.density;
      theme.value = state.theme;
      density.value = state.density;
      grid.style.setProperty('--gap', state.density === 'compact' ? '14px' : '24px');
    };

    const save = (state) => localStorage.setItem(key, JSON.stringify(state));
    const load = () => {
      try { return JSON.parse(localStorage.getItem(key) || ''); }
      catch { return null; }
    };

    let state = load() || { theme: 'dark', density: 'comfortable' };
    apply(state);

    theme.addEventListener('change', () => {
      state = { ...state, theme: theme.value };
      apply(state);
      save(state);
    });

    density.addEventListener('change', () => {
      state = { ...state, density: density.value };
      apply(state);
      save(state);
    });

    reset.addEventListener('click', () => {
      state = { theme: 'dark', density: 'comfortable' };
      apply(state);
      save(state);
    });
  </script>
</body>
</html>
