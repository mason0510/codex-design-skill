name: Feature request
description: 提交新的设计工作流、参考文档、模板或校验建议
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 先讲清楚真实痛点，不要只讲想法
    validations:
      required: true
  - type: dropdown
    id: location
    attributes:
      label: 你认为更适合放在哪里
      options:
        - SKILL.md
        - references/
        - templates/
        - scripts/
        - README / docs
        - 不确定
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 最短可行方案即可
    validations:
      required: true
  - type: textarea
    id: reuse
    attributes:
      label: 可复用性说明
      description: 为什么这不是一次性需求或私有规则？
    validations:
      required: true
